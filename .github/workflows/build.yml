name: NX30Pro Builder

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
          python3-distutils rsync unzip zlib1g-dev file wget curl

      - name: Clone source
        run: |
          git clone https://github.com/immortalwrt/immortalwrt.git openwrt

      - name: Feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Config
        run: |
          cd openwrt
          echo "CONFIG_TARGET_mediatek=y" > .config
          echo "CONFIG_TARGET_mediatek_filogic=y" >> .config
          echo "CONFIG_TARGET_mediatek_filogic_DEVICE_h3c_magic_nx30_pro=y" >> .config
          echo "CONFIG_PACKAGE_luci=y" >> .config
          echo "CONFIG_PACKAGE_luci-ssl=y" >> .config
          make defconfig

      - name: Build
        run: |
          cd openwrt
          make -j$(nproc)

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: openwrt/bin/targets/
