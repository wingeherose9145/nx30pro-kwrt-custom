name: NX30Pro Custom Firmware Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache downloads
        uses: actions/cache@v3
        with:
          path: openwrt/dl
          key: openwrt-dl-cache
          
      - name: Cache toolchain
        uses: actions/cache@v3
        with:
          path: openwrt/staging_dir
          key: openwrt-staging-cache

      - name: Install dependencies
        run: |
          sudo apt-get update -yq
          sudo apt-get install -yq build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
          python3-distutils rsync unzip zlib1g-dev file wget curl ccache

      - name: Clone ImmortalWrt
        run: |
          git clone --depth 1 https://github.com/immortalwrt/immortalwrt.git openwrt

      - name: Update & install feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure for NX30 Pro (FIXED)
        run: |
          cd openwrt

          make defconfig

          ./scripts/config --set-val CONFIG_TARGET mediatek
          ./scripts/config --set-val CONFIG_TARGET_SUBTARGET filogic
          ./scripts/config --set-val CONFIG_TARGET_PROFILE "h3c_magic_nx30_pro"

          ./scripts/config --enable CONFIG_PACKAGE_luci
          ./scripts/config --enable CONFIG_PACKAGE_luci-ssl
          ./scripts/config --enable CONFIG_PACKAGE_AdGuardHome

          make defconfig

      - name: Build firmware
        run: |
          cd openwrt
          make -j$(nproc)

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: NX30Pro-firmware
          path: openwrt/bin/targets/mediatek/filogic/
