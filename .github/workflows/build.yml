name: NX30Pro Custom Firmware Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache downloads
        uses: actions/cache@v3
        with:
          path: openwrt/dl
          key: openwrt-dl-cache

      - name: Cache toolchain
        uses: actions/cache@v3
        with:
          path: openwrt/staging_dir
          key: openwrt-staging-cache

      - name: Install dependencies
        run: |
          sudo apt-get update -yq
          sudo apt-get install -yq build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
          python3-distutils rsync unzip zlib1g-dev file wget curl ccache

      - name: Clone ImmortalWrt
        run: |
          git clone --depth 1 https://github.com/immortalwrt/immortalwrt.git openwrt

      - name: Update & install feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure for NX30 Pro
        run: |
          cd openwrt

          # 删除旧配置
          rm -f .config

          # 直接写入 .config，确保设备正确
          cat > .config <<EOF
CONFIG_TARGET_mediatek=y
CONFIG_TARGET_mediatek_filogic=y
CONFIG_TARGET_mediatek_filogic_DEVICE_h3c_magic_nx30_pro=y

CONFIG_PACKAGE_luci=y
CONFIG_PACKAGE_luci-ssl=y
CONFIG_PACKAGE_AdGuardHome=y
CONFIG_DEVEL=y
EOF

          # 生成最终配置
          make defconfig

      - name: Build firmware
        run: |
          cd openwrt
          make -j$(nproc)

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: NX30Pro-firmware
          path: openwrt/bin/targets/mediatek/filogic/
