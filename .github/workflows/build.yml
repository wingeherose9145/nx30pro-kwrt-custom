name: NX30Pro Custom Firmware Build

on:
  push:
    branches:
      - main
  workflow_dispatch: # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write # 赋予创建 Release 的权限

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialization environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install $(curl -fsSL https://is.gd/depends_ubuntu_2204)
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean
          sudo timedatectl set-timezone "Asia/Shanghai"

      - name: Clone ImmortalWrt
        run: |
          git clone --depth 1 https://github.com/immortalwrt/immortalwrt.git openwrt
          
      - name: Update & install feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure for NX30 Pro
        run: |
          cd openwrt
          # 核心配置：确保目标平台和设备完全正确
          echo "CONFIG_TARGET_mediatek=y" > .config
          echo "CONFIG_TARGET_mediatek_filogic=y" >> .config
          echo "CONFIG_TARGET_mediatek_filogic_DEVICE_h3c_magic_nx30_pro=y" >> .config
          
          # 基础组件
          echo "CONFIG_PACKAGE_luci=y" >> .config
          echo "CONFIG_PACKAGE_luci-theme-argon=y" >> .config
          echo "CONFIG_PACKAGE_luci-ssl=y" >> .config
          
          # 你的自定义插件
          echo "CONFIG_PACKAGE_luci-app-adguardhome=y" >> .config
          echo "CONFIG_PACKAGE_curl=y" >> .config
          echo "CONFIG_PACKAGE_wget-ssl=y" >> .config
          
          # 扩充内核空间和生成 sysupgrade 镜像的关键项
          echo "CONFIG_TARGET_EXT4_JOURNAL=y" >> .config
          
          make defconfig

      - name: Download package
        run: |
          cd openwrt
          make download -j8
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: Build firmware
        run: |
          cd openwrt
          echo -e "$(nproc) thread compile"
          make -j$(nproc) || make -j1 || make -j1 V=s

      - name: Prepare Artifacts
        run: |
          cd openwrt/bin/targets/mediatek/filogic/
          # 这里的操作是为了方便 Release 上传，只保留我们需要的文件
          mkdir -p /tmp/release/
          cp -f *sysupgrade.bin /tmp/release/ || true
          cp -f *factory.bin /tmp/release/ || true
          echo "RELEASE_TIME=$(date +%Y%m%d%H%M)" >> $GITHUB_ENV

      - name: Upload firmware to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NX30Pro-firmware-${{ env.RELEASE_TIME }}
          path: /tmp/release/*

      - name: Publish Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: firmware-${{ env.RELEASE_TIME }}
          files: /tmp/release/*
          body: |
            H3C NX30 Pro 编译完成
            编译时间：${{ env.RELEASE_TIME }}
            包含 AdGuardHome 等常用插件。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
