name: NX30Pro Custom Firmware Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup caching
        uses: actions/cache@v3
        with:
          path: |
            openwrt/downloads
            openwrt/staging_dir
          key: ${{ runner.os }}-openwrt-${{ github.sha }}

      - name: Install dependencies
        run: |
          sudo apt-get update -yq
          sudo apt-get install -yq build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
          python3-distutils rsync unzip zlib1g-dev file wget curl ccache

      - name: Clone ImmortalWrt
        run: |
          git clone https://github.com/immortalwrt/immortalwrt.git openwrt

      - name: Update & install feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure for NX30 Pro
        run: |
          cd openwrt
          cat <<EOF > .config
CONFIG_TARGET_mediatek=y
CONFIG_TARGET_mediatek_filogic=y
CONFIG_TARGET_mediatek_filogic_DEVICE_h3c_magic_nx30_pro=y
CONFIG_PACKAGE_luci=y
CONFIG_PACKAGE_luci-ssl=y
CONFIG_PACKAGE_AdGuardHome=y
CONFIG_PACKAGE_curl=y
CONFIG_PACKAGE_wget=y
CONFIG_PACKAGE_coreutils-nohup=y
CONFIG_DEVEL=y
EOF
          make defconfig

      - name: Build firmware
        run: |
          cd openwrt
          make -j$(nproc) V=s

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: NX30Pro-firmware
          path: openwrt/bin/targets/mediatek/filogic/

      - name: Publish Release
        uses: softprops/action-gh-release@v1
        with:
          files: openwrt/bin/targets/mediatek/filogic/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
